<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iframe 사이트 띄우기</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #eee;
    }
    #container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-shrink: 0;
    }
    #url-input {
      flex: 1;
      padding: 8px 12px;
      font-size: 15px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #222;
      color: white;
      outline: none;
    }
    #url-input:focus {
      border-color: #0066ff;
      box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.2);
    }
    button {
      padding: 8px 16px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background: #0055dd;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      padding: 20px 40px;
      border-radius: 12px;
      color: #ff6b6b;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="container">
  <div id="header">
    <input type="text" id="url-input" placeholder="https://example.com" autofocus spellcheck="false"/>
    <button onclick="loadURL()">열기</button>
  </div>
  <iframe id="preview" src="about:blank"></iframe>
</div>

<div id="error">이 사이트는 iframe 차단(X-Frame-Options 또는 CSP)을 사용 중이라<br>여기서는 표시할 수 없습니다 😢</div>

<script>
const iframe = document.getElementById('preview');
const input = document.getElementById('url-input');
const errorDiv = document.getElementById('error');

function loadURL() {
  let url = input.value.trim();
  
  // http/https 자동 추가
  if (url && !url.match(/^https?:\/\//i)) {
    url = 'https://' + url;
  }
  
  if (!url) {
    alert('주소를 입력해주세요');
    return;
  }

  errorDiv.style.display = 'none';
  iframe.src = url;
}

// 엔터키로도 열리게
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    loadURL();
  }
});

// 처음 열 때 인기 사이트 하나 정도 띄워놓기 (선택)
window.addEventListener('load', () => {
  input.value = 'https://www.google.com';
  // loadURL();   ← 주석 풀면 자동으로 구글 열림
});
</script>

</body>
</html>
