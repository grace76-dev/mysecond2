<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 여기서 탭 제목과 아이콘만 바꾸면 끝! (기본은 Google Docs 위장) -->
  <title>Google Docs - Untitled document</title>
  <link rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #00ff9d;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff9d;
    }
    .info {
      color: #888;
      margin-bottom: 30px;
    }
    .menu {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .game-card {
      width: 240px;
      height: 140px;
      background: #1e1e1e;
      border: 2px solid #333;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .game-card:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 12px 30px rgba(0,255,157,0.4);
      border-color: #00ff9d;
    }
    #gameFrame {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      border: none;
      display: none;
      z-index: 9999;
      background: #000;
    }
    #backBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 10000;
      padding: 12px 24px;
      background: #ff2d55;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>오프라인 게임 모음</h1>
  <p class="info">
    games 폴더에 .html 파일만 넣으면 자동으로 메뉴에 추가돼요!<br>
    (파일 이름 = 게임 제목, 예: "super-mario.html" → "SUPER MARIO" 버튼)
  </p>

  <div class="menu" id="menu"></div>

  <iframe id="gameFrame" allowfullscreen allow="fullscreen;pointer-lock;gamepad"></iframe>
  <button id="backBtn" onclick="closeGame()">게임 종료하고 돌아가기</button>

  <script>
    const menu = document.getElementById('menu');

    // games 폴더 안 파일 목록을 수동으로 나열 (실제로는 파일 시스템 접근 불가라 미리 목록 작성)
    // 친구들이 새 게임 추가할 때마다 여기에 파일 이름만 추가하면 됨
    const gameFiles = [
      'mario-kart.html',
      'pacman.html',
      'tetris.html',
      'sonic.html'
      // 새 게임 추가 시 여기에 파일 이름만 넣기 (games 폴더에 넣은 파일 이름과 동일하게!)
    ];

    gameFiles.forEach(file => {
      const name = file.replace('.html', '').replace(/-/g, ' ').toUpperCase();
      const btn = document.createElement('div');
      btn.className = 'game-card';
      btn.textContent = name;
      btn.onclick = () => playGame(`games/${file}`);
      menu.appendChild(btn);
    });

    // 게임이 없으면 안내 문구
    if (gameFiles.length === 0) {
      menu.innerHTML = '<p style="color:#888;">아직 게임이 없어요!<br>games 폴더에 .html 파일 넣고 새로고침 해보세요.</p>';
    }

    function playGame(url) {
      document.getElementById('gameFrame').src = url;
      document.getElementById('gameFrame').style.display = 'block';
      document.getElementById('backBtn').style.display = 'block';
    }

    function closeGame() {
      document.getElementById('gameFrame').src = '';
      document.getElementById('gameFrame').style.display = 'none';
      document.getElementById('backBtn').style.display = 'none';
    }

    // 탭 위장 (고가디언 대비)
    const fakeTitle = "Google Docs - Untitled document";
    const fakeFavicon = "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico";
    setInterval(() => {
      document.title = fakeTitle;
      let link = document.querySelector('link[rel*="icon"]') || document.createElement('link');
      link.rel = 'icon';
      link.href = fakeFavicon;
      document.head.appendChild(link);
    }, 1000);
  </script>
</body>
</html>
